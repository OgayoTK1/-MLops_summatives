version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    # no fixed container_name / no host port publish here on purpose:
    # this service is meant to be scaled, e.g. `docker compose up --scale api=3`
    expose:
      - "8000"
    volumes:
      - ./models:/app/models   # persist/share the trained model across restarts
      - ./data:/app/data       # persist uploaded + training data
    restart: unless-stopped

  loadbalancer:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"   # single stable entrypoint for the API, however many `api` replicas exist
    depends_on:
      - api
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://loadbalancer:80
    depends_on:
      - loadbalancer
    restart: unless-stopped
