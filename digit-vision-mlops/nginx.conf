events {}

http {
    # Docker's embedded DNS (127.0.0.11) returns a different container IP for
    # "api" on each lookup when the service is scaled with
    # `docker compose up --scale api=N`. Re-resolving per request (instead of
    # a static `upstream {}` block, which only resolves once at nginx start)
    # is what actually spreads traffic across all replicas.
    resolver 127.0.0.11 valid=5s;

    server {
        listen 80;

        location / {
            set $upstream api:8000;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }
    }
}
